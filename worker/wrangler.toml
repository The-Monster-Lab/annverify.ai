# ⑥ Infrastructure Layer — Cloudflare Worker 배포 설정
# wrangler deploy 명령 전에 name과 account_id를 실제 값으로 수정하세요

name       = "ann-proxy"
main       = "worker-v4.js"
compatibility_date = "2024-09-23"
account_id = "2b10ac43a3fe8ddb0d93bd28f06338b2"


# Custom Domain — annverify.ai
[[routes]]
pattern = "api.annverify.ai"
custom_domain = true

# ── Cron Triggers ────────────────────────────────────────────────────
# Beta (~2026-04-14): 매시간 1건 AI 기사 합성·배포
# v2.0 (2026-04-15+): Tavily 실시간 트렌드 연동 후 60분 2건으로 전환
[triggers]
crons = ["0 * * * *"]

[limits]
max_subrequests = 1000

# Secrets (wrangler secret put 명령으로 등록):
#   ANTHROPIC_API_KEY
#   OPENAI_API_KEY
#   XAI_API_KEY
#   HF_API_KEY
#   CMC_API_KEY
#   FIREBASE_SA_JSON   ← Firebase Service Account JSON (전체 JSON 문자열)
